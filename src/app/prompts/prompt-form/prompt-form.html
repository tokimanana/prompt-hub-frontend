<p-card>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="title" type="text">Title</label>
      <input formControlName="title" type="text" pInputText id="title" class="w-full" />
      <small class="invalid-feedback">The title is required (max. 30 c)</small>
    </div>
    <div class="field">
      <label for="content" type="text">Content</label>
      <textarea
        formControlName="content"
        type="text"
        pTextarea
        id="content"
        class="w-full"
      ></textarea>
      <small class="invalid-feedback">The content is required</small>
    </div>
    <div class="field">
      <label for="category">Category</label>
      <p-select
        formControlName="categoryId"
        inputId="category"
        class="w-full"
        [options]="categories()"
        optionValue="id"
        optionLabel="name"
      />
      <small class="invalid-feedback">The category is required</small>
    </div>
    <div class="flex justify-content-end gap-2">
      @if (promptId()) {
        <p-button
          label="Delete"
          class="mr-auto"
          [outlined]="true"
          severity="danger"
          (onClick)="deletePrompt()"
        />
      }
      <p-button routerLink="/" label="Cancel" severity="secondary" />
      <p-button type="submit" [label]="promptId() ? 'Edit' : 'Create'" />
    </div>
  </form>
</p-card>
