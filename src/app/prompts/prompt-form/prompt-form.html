<p-card>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="title" type="text">Title</label>
      <input formControlName="title" type="text" pInputText id="title" class="w-full" />
    </div>
    <div class="field">
      <label for="content" type="text">Content</label>
      <textarea
        formControlName="content"
        type="text"
        pTextarea
        id="content"
        class="w-full"
      ></textarea>
    </div>
    <div class="field">
      <label for="category">Category</label>
      <p-select
        formControlName="categoryId"
        inputId="category"
        class="w-full"
        [options]="categories()"
        optionValue="id"
        optionLabel="name"
      />
    </div>
    <div class="flex justify-content-end gap-2">
      <p-button label="Cancel" severity="secondary" />
      <p-button type="submit" label="Create" />
    </div>
  </form>
</p-card>
