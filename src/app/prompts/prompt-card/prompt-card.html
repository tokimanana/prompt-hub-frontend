<p-card>
  <div>
    {{ prompt().title }} par {{ prompt().author.username }}
    <p-button label="Edit" size="small" />
    <p-button label="Copy" size="small" (click)="copyToClipboard()" />
  </div>
  <textarea pTextarea readonly style="width: 100%" rows="8">{{ prompt().content }}</textarea>
  <div>
    <p-tag [value]="prompt().category.name"/>
    <p-button label="UpVote" size="small" />
    <span>{{ prompt().score }}</span>
    <p-button label="DownVote" size="small" />
  </div>
</p-card>
