<header class="navbar-shadow p-3 mb-4">
  <div class="container flex justify-content-between align-items-center">
    <a routerLink="/" class="navbar-logo flex gap-2 align-items-center">
      <img ngSrc="/logo-prompt-hub.png" alt="logo" width="36" height="36" />
      Prompt Hub
    </a>
    <div class="flex gap-2">
      <p-button label="Connection" severity="secondary" icon="pi pi-sign-in" size="small" routerLink="/auth" />
      <p-button
        size="small"
        (onClick)="toggleDarkMode()"
        severity="secondary"
        [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      />
      <p-button label="Add" icon="pi pi-plus" size="small" routerLink="/prompts/create" />
    </div>
  </div>
</header>
